<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Ticket | Restaurants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #1a1a2e;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .header-logo {
            font-size: 18px;
            font-weight: 300;
            color: white;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-logo span { color: rgba(255,200,80,0.9); }

        .header-tag {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* CONTENIDO */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }

        .card-icon {
            font-size: 44px;
            display: block;
            text-align: center;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 16px rgba(255,200,80,0.3));
        }

        .card-title {
            font-size: 22px;
            font-weight: 200;
            color: white;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 8px;
        }

        .card-divider {
            width: 40px;
            height: 1px;
            background: rgba(255,200,80,0.4);
            margin: 12px auto 20px;
        }

        .card-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.8;
            margin-bottom: 36px;
        }

        /* INPUT */
        .field-label {
            font-size: 10px;
            color: rgba(255,200,80,0.8);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
            font-weight: 500;
        }

        .code-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            font-size: 16px;
            color: white;
            outline: none;
            letter-spacing: 3px;
            text-align: center;
            transition: all 0.3s;
            font-family: 'Segoe UI', monospace;
        }

        .code-input:focus {
            border-color: rgba(255,200,80,0.5);
            background: rgba(255,255,255,0.12);
        }

        .code-input::placeholder {
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            font-size: 14px;
        }

        /* BOTONES */
        .btn-agregar {
            width: 100%;
            margin-top: 24px;
            padding: 15px;
            background: rgba(255,200,80,0.9);
            color: #12122a;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-agregar:hover {
            background: rgba(255,200,80,1);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(255,200,80,0.2);
        }

        .secondary-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
        }

        .btn-secondary {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: block;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-logo">Rest<span>aurants</span></div>
        <span class="header-tag">Mi cuenta</span>
    </header>

    <div class="main-content">
        <div class="card">
            <span class="card-icon">🎫</span>
            <h2 class="card-title">Agregar Ticket</h2>
            <div class="card-divider"></div>
            <p class="card-subtitle">Ingresa el código único que aparece<br>en tu ticket de compra</p>

            <label class="field-label" for="codigo">Código del ticket</label>
            <input
                type="text"
                id="codigo"
                class="code-input"
                placeholder="ABC-123456"
                maxlength="20"
            />

            <button class="btn-agregar">Agregar Ticket</button>

            <div class="secondary-btns">
                <a href="/menu-cliente/" class="btn-secondary">← Regresar al menú</a>
                <a href="/historial/" class="btn-secondary">📋 Ver historial de consumos</a>
            </div>
        </div>
    </div>

    <footer>Restaurants &copy; 2026</footer>

</body>
</html>
