<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Ticket | Restaurants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #1a1a2e;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        header span {
            font-size: 13px;
            color: #a0a0c0;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background-color: white;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .card-subtitle {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
            display: block;
        }
        .code-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #1a1a2e;
            background-color: #fafafa;
            transition: border-color 0.2s ease;
            outline: none;
            letter-spacing: 1px;
        }
        .code-input:focus {
            border-color: #1a1a2e;
            background-color: white;
        }
        .code-input::placeholder {
            color: #bbb;
            letter-spacing: 0;
        }
        .btn-agregar {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background-color: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn-agregar:hover {
            background-color: #2d2d4e;
        }
        .secondary-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-secondary {
            width: 100%;
            padding: 13px;
            background-color: white;
            color: #1a1a2e;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            display: block;
        }
        .btn-secondary:hover {
            border-color: #1a1a2e;
            background-color: #f0f0f8;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <h1>Restaurants</h1>
        <span>Mi cuenta</span>
    </header>
    <div class="main-content">
        <div class="card">
            <div class="card-title">🎫 Agrega tu ticket</div>
            <p class="card-subtitle">Agrega el unicode que viene en tu ticket de compra</p>

            <label class="field-label" for="codigo">Código:</label>
            <input
                type="text"
                id="codigo"
                class="code-input"
                placeholder="Ej. ABC-123456"
                maxlength="20"
            />

            <button class="btn-agregar">Agregar</button>

            <div class="secondary-btns">
                <a href="/menu-cliente/" class="btn-secondary">← Regresar</a>
                <a href="/historial/" class="btn-secondary">📋 Ver historial de consumos</a>
            </div>
        </div>
    </div>
    <footer>
        Restaurants &copy; 2026
    </footer>
</body>
</html>
