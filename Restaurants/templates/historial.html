<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial | Restaurants</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #1a1a2e;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        header span {
            font-size: 13px;
            color: #a0a0c0;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .page-header {
            width: 100%;
            max-width: 860px;
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .page-header p {
            font-size: 14px;
            color: #666;
        }
        .btn-regresar {
            display: inline-block;
            margin-bottom: 24px;
            padding: 11px 20px;
            background-color: white;
            color: #1a1a2e;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            align-self: flex-start;
        }
        .btn-regresar:hover {
            border-color: #1a1a2e;
            background-color: #f0f0f8;
        }
        .table-wrapper {
            width: 100%;
            max-width: 860px;
            background-color: white;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background-color: #1a1a2e;
            color: white;
        }
        thead th {
            padding: 14px 18px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        tbody tr {
            border-bottom: 1px solid #eee;
            transition: background-color 0.15s ease;
        }
        tbody tr:last-child {
            border-bottom: none;
        }
        tbody tr:hover {
            background-color: #f7f7fc;
        }
        tbody td {
            padding: 14px 18px;
            font-size: 14px;
            color: #333;
        }
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #aaa;
        }
        .empty-state .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 14px;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <h1>Restaurants</h1>
        <span>Mi cuenta</span>
    </header>
    <div class="main-content">
        <div class="page-header">
            <h2>📋 Historial</h2>
            <p>Consulta de historial con tus consumos previos</p>
        </div>

        <a href="/menu-cliente/" class="btn-secondary">← Regresar</a>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Alimentos / Bebidas</th>
                        <th>Total</th>
                        <th>Descuento</th>
                        <th>Precio Final</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Aquí se llenarán los registros dinámicamente -->
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="empty-icon">🧾</div>
                                <p>Aún no tienes consumos registrados.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <footer>
        Restaurants &copy; 2026
    </footer>
</body>
</html>
